<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calendrier RDV</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; padding: 2rem; }
  .cal { max-width: 720px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .nav-btn { background: none; border: 0.5px solid #ccc; border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 14px; color: #111; display: flex; align-items: center; gap: 4px; }
  .nav-btn:hover { background: #eee; }
  .month-label { font-size: 18px; font-weight: 500; }
  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 4px; }
  .weekday { text-align: center; font-size: 12px; color: #888; padding: 6px 0; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
  .weekday.active-day { color: #378ADD; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .day { min-height: 72px; border-radius: 8px; border: 0.5px solid #e0e0e0; padding: 6px; background: #fff; transition: border-color 0.15s; }
  .day.bookable { cursor: pointer; }
  .day.bookable:hover { border-color: #378ADD; }
  .day.other-month { opacity: 0.4; cursor: default; }
  .day.past { background: #f9f9f9; cursor: not-allowed; }
  .day.past .day-num { color: #bbb; }
  .day.blocked { background: #f7f7f7; cursor: not-allowed; }
  .day.blocked .day-num { color: #ccc; }
  .day.today { border-color: #378ADD; }
  .day.today .day-num { color: #185FA5; font-weight: 500; }
  .day.selected { border-color: #7F77DD; background: #EEEDFE; }
  .day-num { font-size: 13px; margin-bottom: 4px; }
  .events { display: flex; flex-direction: column; gap: 2px; }
  .ev-pill { font-size: 11px; padding: 1px 5px; border-radius: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ev-pill.cat-rdv { background: #B5D4F4; color: #0C447C; }
  .more-ev { font-size: 10px; color: #888; margin-top: 1px; }
  .avail-dot { width: 6px; height: 6px; border-radius: 50%; background: #1D9E75; display: inline-block; margin-top: 2px; }

  .panel { border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 1.25rem; margin-top: 1.5rem; background: #fff; }
  .panel-title { font-size: 15px; font-weight: 500; margin-bottom: 0.25rem; }
  .panel-sub { font-size: 12px; color: #888; margin-bottom: 1rem; }
  .ev-list { display: flex; flex-direction: column; gap: 8px; }
  .ev-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; border: 0.5px solid #e0e0e0; background: #f9f9f9; }
  .ev-dot { width: 8px; height: 8px; border-radius: 50%; background: #378ADD; flex-shrink: 0; }
  .ev-info { flex: 1; }
  .ev-name { font-size: 13px; font-weight: 500; }
  .ev-time { font-size: 12px; color: #888; }
  .ev-actions { display: flex; gap: 6px; align-items: center; }
  .ev-del { background: none; border: none; cursor: pointer; color: #bbb; font-size: 16px; padding: 0 2px; }
  .ev-del:hover { color: #E24B4A; }
  .empty-msg { font-size: 13px; color: #888; text-align: center; padding: 1rem 0; }
  .blocked-msg { font-size: 13px; color: #bbb; text-align: center; padding: 1rem 0; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .blocked-msg i { font-size: 22px; }

  .add-form { display: flex; flex-direction: column; gap: 10px; margin-top: 1rem; border-top: 0.5px solid #e0e0e0; padding-top: 1rem; }
  .form-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .add-form input, .add-form select { font-size: 13px; padding: 6px 10px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #111; }
  .add-form input[type=text] { flex: 1; min-width: 160px; }
  .add-form select { width: 130px; }
  .add-btn { background: #378ADD; color: #fff; border: none; border-radius: 8px; padding: 7px 16px; font-size: 13px; cursor: pointer; font-weight: 500; white-space: nowrap; }
  .add-btn:hover { background: #185FA5; }
  .add-btn:disabled { background: #ccc; cursor: not-allowed; }
  .error-msg { font-size: 12px; color: #E24B4A; }

  .gcal-inline { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #378ADD; text-decoration: none; border: 0.5px solid #B5D4F4; border-radius: 5px; padding: 2px 7px; white-space: nowrap; }
  .gcal-inline:hover { background: #E6F1FB; }
  .gcal-inline i { font-size: 13px; }

  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 1rem; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #666; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .share-bar { display: flex; align-items: center; gap: 8px; background: #fff; border: 0.5px solid #e0e0e0; border-radius: 8px; padding: 8px 12px; margin-bottom: 1.5rem; }
  .share-url { flex: 1; font-size: 12px; color: #555; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .share-copy-btn { background: none; border: 0.5px solid #ccc; border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; color: #111; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
  .share-copy-btn:hover { background: #f0f0f0; }
  .share-label { font-size: 12px; color: #888; white-space: nowrap; }

  /* Modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: #fff; border-radius: 14px; padding: 1.5rem; max-width: 420px; width: 90%; }
  .modal-title { font-size: 16px; font-weight: 500; margin-bottom: 0.25rem; }
  .modal-sub { font-size: 13px; color: #888; margin-bottom: 1.25rem; }
  .modal-ev-info { background: #f0f7ff; border-radius: 8px; padding: 10px 14px; margin-bottom: 1.25rem; font-size: 13px; border-left: 3px solid #378ADD; }
  .modal-ev-info strong { display: block; font-size: 14px; margin-bottom: 2px; }
  .modal-ev-info span { color: #555; }
  .modal-btns { display: flex; flex-direction: column; gap: 8px; }
  .gcal-btn { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; border: 0.5px solid #e0e0e0; background: #fff; cursor: pointer; font-size: 13px; font-weight: 500; color: #111; text-decoration: none; transition: background 0.15s; }
  .gcal-btn:hover { background: #f5f5f5; }
  .gcal-btn .gcal-icon { width: 22px; height: 22px; flex-shrink: 0; }
  .gcal-btn-label { display: flex; flex-direction: column; }
  .gcal-btn-sub { font-size: 11px; color: #888; font-weight: 400; }
  .skip-btn { background: none; border: none; cursor: pointer; font-size: 13px; color: #aaa; padding: 6px 0; text-align: center; width: 100%; }
  .skip-btn:hover { color: #888; }

  .loading-bar { text-align: center; padding: 1rem; color: #888; font-size: 13px; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #f0f0f0; }
    .day { background: #242424; border-color: #333; }
    .day.bookable:hover { border-color: #378ADD; }
    .day.past { background: #1e1e1e; }
    .day.blocked { background: #1c1c1c; }
    .day.today { border-color: #378ADD; }
    .day.selected { background: #1e1b3e; border-color: #7F77DD; }
    .nav-btn { border-color: #444; color: #f0f0f0; }
    .nav-btn:hover { background: #2a2a2a; }
    .panel { background: #242424; border-color: #333; }
    .ev-row { background: #2e2e2e; border-color: #3a3a3a; }
    .add-form input, .add-form select { background: #2e2e2e; border-color: #444; color: #f0f0f0; }
    .modal { background: #242424; color: #f0f0f0; }
    .modal-ev-info { background: #1a2a3a; }
    .gcal-btn { background: #2e2e2e; border-color: #444; color: #f0f0f0; }
    .gcal-btn:hover { background: #3a3a3a; }
    .share-bar { background: #242424; border-color: #333; }
    .share-url { color: #aaa; }
    .share-copy-btn { color: #f0f0f0; border-color: #444; }
    .share-copy-btn:hover { background: #333; }
    .legend-item { color: #aaa; }
  }
</style>
</head>
<body>
<div class="cal">
  <div class="header">
    <button class="nav-btn" onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
    <span class="month-label" id="month-label"></span>
    <div style="display:flex;gap:6px">
      <button class="nav-btn" style="font-size:13px;padding:6px 14px" onclick="goToday()">Aujourd'hui</button>
      <button class="nav-btn" onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>

  <div class="share-bar">

<script>
const SUPABASE_URL  = 'https://aqkyfrjxhqswbjpsowjy.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxa3lmcmp4aHFzd2JqcHNvd2p5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MTczNTAsImV4cCI6MjA5NzA5MzM1MH0.22V01whXLFU_P1hGfepVutWwWeUl78TOklHCjKRQkQM';
const OWNER_EMAIL   = 'juju.zivkovic@gmail.com';
const TABLE         = 'rendez_vous';

const MONTHS   = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DAYS_FR  = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const ALLOWED_DAYS = new Set([0, 2, 3, 4]);
const START_HOUR = 16, START_MIN = 30, END_HOUR = 21, SLOT_MIN = 30;

const now = new Date();
let cur = { y: now.getFullYear(), m: now.getMonth() };
let selected = null;
let events = {};

// ---- Supabase helpers ----
async function sbFetch(path, opts={}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_ANON,
      'Authorization': `Bearer ${SUPABASE_ANON}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...opts.headers
    },
    ...opts
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function loadAllEvents() {
  const rows = await sbFetch(`${TABLE}?select=*&order=time.asc`);
  events = {};
  rows.forEach(r => {
    if (!events[r.date]) events[r.date] = [];
    events[r.date].push({ id: r.id, name: r.name, time: r.time });
  });
}

async function insertEvent(date, time, name) {
  const rows = await sbFetch(TABLE, {
    method: 'POST',
    body: JSON.stringify({ date, time, name })
  });
  return rows[0];
}

async function deleteEventDb(id) {
  await sbFetch(`${TABLE}?id=eq.${id}`, { method: 'DELETE' });
}

// ---- Realtime polling (every 10s) ----
setInterval(async () => {
  await loadAllEvents();
  render();
  if (selected) renderPanel();
}, 10000);

// ---- Share link ----
document.getElementById('share-url').textContent = window.location.href;
function copyShareLink() {
  navigator.clipboard.writeText(window.location.href);
  const btn = document.querySelector('.share-copy-btn');
  btn.innerHTML = '<i class="ti ti-check"></i> Copié !';
  setTimeout(() => btn.innerHTML = '<i class="ti ti-copy"></i> Copier', 2000);
}

// ---- Calendar helpers ----
function dateKey(y, m, d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function todayKey() { return dateKey(now.getFullYear(), now.getMonth(), now.getDate()); }
function isPast(y, m, d) { return new Date(y,m,d) < new Date(now.getFullYear(),now.getMonth(),now.getDate()); }
function isAllowed(y, m, d) { return ALLOWED_DAYS.has(new Date(y,m,d).getDay()); }

function getSlots() {
  const s=[]; let h=START_HOUR, mn=START_MIN;
  while(h<END_HOUR||(h===END_HOUR&&mn===0)){
    s.push(`${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`);
    mn+=SLOT_MIN; if(mn>=60){mn-=60;h++;}
  }
  return s;
}

function getFutureSlots(key) {
  const [y,m,d] = key.split('-').map(Number);
  const isToday = new Date(y,m-1,d).getTime()===new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();
  const taken = new Set((events[key]||[]).map(e=>e.time));
  return getSlots().filter(slot => {
    if(taken.has(slot)) return false;
    if(isToday) {
      const [sh,sm]=slot.split(':').map(Number);
      return sh*60+sm > now.getHours()*60+now.getMinutes();
    }
    return true;
  });
}

// ---- Google Calendar URL ----
function gcalUrl(title, dateStr, timeStr, durationMin=30, calEmail=null) {
  const [y,m,d] = dateStr.split('-').map(Number);
  const [h,mn]  = timeStr.split(':').map(Number);
  const pad = n => String(n).padStart(2,'0');
  const startDt = `${y}${pad(m)}${pad(d)}T${pad(h)}${pad(mn)}00`;
  let eh=h, emn=mn+durationMin;
  if(emn>=60){emn-=60;eh++;}
  const endDt = `${y}${pad(m)}${pad(d)}T${pad(eh)}${pad(emn)}00`;
  const params = new URLSearchParams({
    action: 'TEMPLATE',
    text: title,
    dates: `${startDt}/${endDt}`,
    details: 'Rendez-vous réservé via le calendrier en ligne.'
  });
  if(calEmail) params.set('src', calEmail);
  return `https://calendar.google.com/calendar/render?${params.toString()}`;
}

function openGcalModal(key, ev) {
  const [y,m,d] = key.split('-').map(Number);
  const dow = new Date(y,m-1,d).getDay();
  const dateLabel = `${DAYS_FR[dow]} ${d} ${MONTHS[m-1]} ${y}`;
  document.getElementById('modal-ev-info').innerHTML =
    `<strong>${ev.name}</strong><span>${dateLabel} · ${ev.time}</span>`;
  document.getElementById('gcal-link-user').href = gcalUrl(ev.name, key, ev.time);
  document.getElementById('gcal-link-juju').href = gcalUrl(ev.name, key, ev.time, 30, OWNER_EMAIL);
  document.getElementById('modal').style.display = 'flex';
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }

// ---- Navigation ----
function changeMonth(dir) {
  cur.m+=dir;
  if(cur.m>11){cur.m=0;cur.y++;} if(cur.m<0){cur.m=11;cur.y--;}
  render();
}
function goToday() { cur.y=now.getFullYear(); cur.m=now.getMonth(); render(); }

// ---- Render calendar ----
function render() {
  document.getElementById('month-label').textContent = `${MONTHS[cur.m]} ${cur.y}`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const first = new Date(cur.y, cur.m, 1);
  const startDow = (first.getDay()+6)%7;
  const daysInMonth = new Date(cur.y, cur.m+1, 0).getDate();
  const daysInPrev  = new Date(cur.y, cur.m, 0).getDate();
  const cells = [];
  for(let i=startDow-1;i>=0;i--) cells.push({d:daysInPrev-i,pm:-1});
  for(let d=1;d<=daysInMonth;d++) cells.push({d,pm:0});
  let next=1; while(cells.length%7!==0) cells.push({d:next++,pm:1});

  cells.forEach(c => {
    const absM = cur.m+c.pm;
    const absY = absM<0?cur.y-1:absM>11?cur.y+1:cur.y;
    const realM = ((absM%12)+12)%12;
    const key = dateKey(absY,realM,c.d);
    const past = isPast(absY,realM,c.d);
    const allowed = isAllowed(absY,realM,c.d);
    const bookable = !past&&allowed&&c.pm===0;
    const isSel = key===selected;
    const evs = events[key]||[];
    const hasSlots = bookable&&getFutureSlots(key).length>0;

    const div = document.createElement('div');
    let cls = 'day';
    if(c.pm!==0) cls+=' other-month';
    else if(past) cls+=' past';
    else if(!allowed) cls+=' blocked';
    else cls+=' bookable';
    if(key===todayKey()) cls+=' today';
    if(isSel) cls+=' selected';
    div.className = cls;
    if(bookable) div.onclick = () => { selected=key; render(); renderPanel(); };

    let html = `<div class="day-num">${c.d}</div><div class="events">`;
    evs.slice(0,2).forEach(ev => {
      html += `<div class="ev-pill cat-rdv">${ev.time} ${ev.name}</div>`;
    });
    if(evs.length>2) html += `<div class="more-ev">+${evs.length-2} autre${evs.length>3?'s':''}</div>`;
    if(hasSlots&&evs.length===0) html += `<span class="avail-dot"></span>`;
    html += `</div>`;
    div.innerHTML = html;
    grid.appendChild(div);
  });
}

// ---- Render panel ----
function buildTimeSelect(key) {
  const sel = document.getElementById('ev-time');
  sel.innerHTML = '';
  getFutureSlots(key).forEach(slot => {
    const o = document.createElement('option'); o.value=slot; o.textContent=slot; sel.appendChild(o);
  });
}

function renderPanel() {
  const titleEl = document.getElementById('panel-title');
  const subEl   = document.getElementById('panel-sub');
  const listEl  = document.getElementById('ev-list');
  const formEl  = document.getElementById('add-form');
  const errEl   = document.getElementById('error-msg');
  errEl.style.display = 'none';

  if(!selected){
    titleEl.textContent = 'Sélectionnez un jour disponible';
    subEl.textContent = '';
    listEl.innerHTML = '<p class="empty-msg">Les jours disponibles sont le mardi, mercredi, jeudi et dimanche à partir de 16h30.</p>';
    formEl.style.display = 'none'; return;
  }

  const [y,m,d] = selected.split('-').map(Number);
  const dow = new Date(y,m-1,d).getDay();
  titleEl.textContent = `${DAYS_FR[dow]} ${d} ${MONTHS[m-1]} ${y}`;

  const past    = isPast(y,m-1,d);
  const allowed = isAllowed(y,m-1,d);
  const evs = events[selected]||[];
  listEl.innerHTML = '';

  if(past||!allowed){
    subEl.textContent = '';
    const msg = document.createElement('div'); msg.className='blocked-msg';
    if(past)    msg.innerHTML=`<i class="ti ti-lock"></i><span>Ce jour est passé.</span>`;
    else        msg.innerHTML=`<i class="ti ti-calendar-off"></i><span>Jour non disponible.<br>Choisissez mar · mer · jeu · dim.</span>`;
    listEl.appendChild(msg); formEl.style.display='none'; return;
  }

  const slots = getFutureSlots(selected);
  subEl.textContent = slots.length>0
    ? `${slots.length} créneau${slots.length>1?'x':''} disponible${slots.length>1?'s':''} · à partir de 16h30`
    : 'Aucun créneau disponible ce jour';

  if(evs.length===0) {
    listEl.innerHTML = '<p class="empty-msg">Aucun rendez-vous — réservez un créneau ci-dessous.</p>';
  }
  evs.forEach((ev,i) => {
    const row = document.createElement('div'); row.className='ev-row';
    const gcUrl = gcalUrl(ev.name, selected, ev.time);
    row.innerHTML = `
      <div class="ev-dot"></div>
      <div class="ev-info">
        <div class="ev-name">${ev.name}</div>
        <div class="ev-time">${ev.time}</div>
      </div>
      <div class="ev-actions">
        <a class="gcal-inline" href="${gcUrl}" target="_blank" rel="noopener" title="Ajouter à Google Calendar">
          <i class="ti ti-calendar-plus"></i> Gcal
        </a>
        <button class="ev-del" onclick="removeEvent('${ev.id}','${selected}')" title="Supprimer"><i class="ti ti-x"></i></button>
      </div>`;
    listEl.appendChild(row);
  });

  if(slots.length>0) { formEl.style.display='flex'; buildTimeSelect(selected); }
  else formEl.style.display='none';
}

// ---- Add / delete ----
async function addEvent() {
  const name = document.getElementById('ev-name').value.trim();
  const errEl = document.getElementById('error-msg');
  if(!name){ errEl.textContent='Veuillez entrer un nom.'; errEl.style.display='block'; return; }
  errEl.style.display = 'none';
  const time = document.getElementById('ev-time').value;
  const btn  = document.getElementById('add-btn');
  btn.disabled = true; btn.textContent = 'Réservation…';
  try {
    const row = await insertEvent(selected, time, name);
    if(!events[selected]) events[selected]=[];
    events[selected].push({ id: row.id, name: row.name, time: row.time });
    events[selected].sort((a,b)=>a.time.localeCompare(b.time));
    document.getElementById('ev-name').value = '';
    render(); renderPanel();
    openGcalModal(selected, row);
  } catch(e) {
    errEl.textContent = 'Erreur lors de la réservation. Réessayez.';
    errEl.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = '+ Réserver';
}

async function removeEvent(id, key) {
  try {
    await deleteEventDb(id);
    events[key] = (events[key]||[]).filter(e=>e.id!==id);
    if(events[key].length===0) delete events[key];
    render(); renderPanel();
  } catch(e) { alert('Erreur lors de la suppression.'); }
}

document.getElementById('ev-name').addEventListener('keydown', e => { if(e.key==='Enter') addEvent(); });

// ---- Init ----
(async () => {
  document.getElementById('ev-list').innerHTML = '<p class="loading-bar"><i class="ti ti-loader"></i> Chargement…</p>';
  await loadAllEvents();
  render();
})();
</script>
